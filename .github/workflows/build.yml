name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-typecheck:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b --noEmit

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint-and-typecheck, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci
      - run: npm run build
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"
      - name: Build MSI (signed)
        run: cargo tauri build --bundles msi
        working-directory: src-tauri
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      - name: Generate updater manifest
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $sig = Get-Content "src-tauri/target/release/**/*.msi.sig" -Raw
          $msiFile = Get-ChildItem "src-tauri/target/release/**/*.msi" | Select-Object -First 1
          @"
          {
            "version": "$version",
            "notes": "See $tag release notes for details.",
            "pub_date": "$(Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ" -AsUTC)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$sig",
                "url": "https://github.com/${{ github.repository }}/releases/download/$tag/$($msiFile.Name)"
              }
            }
          }
          "@ | Set-Content "update.json"
          Copy-Item "update.json" "src-tauri/target/release/update.json"
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: opencode-monitor-release
          path: |
            src-tauri/target/release/**/*.msi
            src-tauri/target/release/**/*.msi.sig
            src-tauri/target/release/update.json

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: opencode-monitor-release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.msi
            *.msi.sig
            update.json
          generate_release_notes: true
