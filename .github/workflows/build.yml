name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-typecheck:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b --noEmit

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint-and-typecheck, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci
      - run: npm run build
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"
      - name: Build MSI (signed)
        run: cargo tauri build --bundles msi
        working-directory: src-tauri
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      - name: Debug - find MSI location
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Recurse -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) { Write-Host "MSI found at: $($msi.FullName)" } else { Write-Host "No MSI found anywhere" }
          Get-ChildItem -Recurse -Path "src-tauri\target\release\bundle" -ErrorAction SilentlyContinue | Select-Object FullName, Length
      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          $msiDir = "src-tauri\target\release\bundle\msi"
          Copy-Item "$msiDir\*.msi" staging\
          Copy-Item "$msiDir\*.msi.sig" staging\
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $sigFile = Get-ChildItem "$msiDir\*.msi.sig" | Select-Object -First 1
          $msiFile = Get-ChildItem "$msiDir\*.msi" | Select-Object -First 1
          if (-not $sigFile -or -not $msiFile) { Write-Error "MSI or signature not found in $msiDir"; exit 1 }
          $sig = Get-Content $sigFile.FullName -Raw
          @"
          {
            "version": "$version",
            "notes": "See $tag release notes for details.",
            "pub_date": "$(Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ" -AsUTC)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$sig".Trim(),
                "url": "https://github.com/${{ github.repository }}/releases/download/$tag/$($msiFile.Name)"
              }
            }
          }
          "@ | Set-Content "staging\update.json"
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: opencode-monitor-release
          path: staging/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: opencode-monitor-release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.msi
            *.msi.sig
            update.json
          generate_release_notes: true
